<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGWiki - The Board Gaming Community</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="/" class="logo">BGWiki</a>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/search">Browse</a></li>
          <li><a href="/add-game">Add Game</a></li>
          <li id="nav-login"><a href="/login">Sign In</a></li>
          <li id="nav-user" style="display: none;"><a href="#" id="username-link"></a></li>
          <li id="nav-logout" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
        </ul>
        <form class="search-bar" onsubmit="quickSearch(event)">
          <input type="text" id="quick-search-input" placeholder="Search games...">
          <button type="submit">Go</button>
        </form>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>Discover Your Next Favorite Game</h1>
      <p>Explore thousands of board games, share reviews, and connect with players around the world.</p>
    </div>
  </section>

  <main>
    <div class="container">
      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-value" id="total-games">0</div>
          <div class="stat-label">Games</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="total-reviews">0</div>
          <div class="stat-label">Reviews</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="avg-rating">0</div>
          <div class="stat-label">Avg Rating</div>
        </div>
      </div>

      <h2 class="section-title">Top Rated</h2>
      <div class="games-grid" id="top-games"></div>

      <h2 class="section-title">Trending Now</h2>
      <div class="games-grid" id="hot-games"></div>

      <h2 class="section-title">New Releases</h2>
      <div class="games-grid" id="recent-games"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>BGWiki &copy; 2026 &middot; <a href="https://github.com/kmcq34/bgg-clone" style="color:var(--text-muted);">GitHub</a></p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
