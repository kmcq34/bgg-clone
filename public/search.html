<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Games - BoardGameGeek</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .bubbles {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }
    .bubble {
      position: absolute;
      bottom: -50px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), rgba(100,200,255,0.15));
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }

    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      padding: 1.2rem;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--glass-border);
    }

    .chip {
      padding: 0.4rem 1rem;
      background: linear-gradient(180deg, #f0f8ff 0%, #e0f0ff 100%);
      border: 2px solid rgba(100, 180, 255, 0.3);
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dark);
      transition: all 0.2s;
    }

    .chip:hover {
      background: linear-gradient(180deg, #d0e8ff 0%, #b0d4ff 100%);
      border-color: var(--gloss-blue);
      transform: translateY(-2px);
    }

    .chip.active {
      background: linear-gradient(180deg, #88e066 0%, #3da35d 100%);
      color: white;
      border-color: var(--leaf-green);
      box-shadow: 0 0 12px rgba(61, 163, 93, 0.3);
    }

    .chip .count {
      font-size: 0.75rem;
      opacity: 0.8;
      margin-left: 0.3rem;
    }

    .proposition-section {
      margin-bottom: 2.5rem;
    }

    .proposition-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .proposition-header h2 {
      font-size: 1.3rem;
      color: var(--gloss-blue);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .proposition-header .icon {
      font-size: 1.4rem;
    }

    .proposition-scroll {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 1rem;
      scroll-snap-type: x mandatory;
    }

    .proposition-scroll::-webkit-scrollbar {
      height: 8px;
    }

    .proposition-scroll::-webkit-scrollbar-track {
      background: rgba(100, 180, 255, 0.1);
      border-radius: 10px;
    }

    .proposition-scroll::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #88e066 0%, #3da35d 100%);
      border-radius: 10px;
    }

    .proposition-card {
      min-width: 240px;
      max-width: 240px;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-soft);
      transition: all 0.3s;
      scroll-snap-align: start;
      flex-shrink: 0;
    }

    .proposition-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 35px rgba(0, 100, 180, 0.25), var(--shadow-glow);
    }

    .proposition-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .proposition-card-content {
      padding: 0.8rem;
    }

    .proposition-card h4 {
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proposition-card h4 a {
      color: var(--text-dark);
    }

    .proposition-card h4 a:hover {
      color: var(--gloss-blue);
    }

    .proposition-tag {
      display: inline-block;
      background: linear-gradient(180deg, #88e066 0%, #3da35d 100%);
      color: white;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .proposition-tag.orange {
      background: linear-gradient(180deg, #ffb347 0%, #ff9900 100%);
    }

    .proposition-tag.blue {
      background: linear-gradient(180deg, #4da6ff 0%, #0078d7 100%);
    }

    .proposition-tag.purple {
      background: linear-gradient(180deg, #b48eff 0%, #7b4dff 100%);
    }

    .search-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .search-results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    @media (min-width: 768px) {
      .search-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="bubbles">
    <div class="bubble" style="left:12%;width:50px;height:50px;animation-duration:15s;animation-delay:0s;"></div>
    <div class="bubble" style="left:35%;width:32px;height:32px;animation-duration:19s;animation-delay:2s;"></div>
    <div class="bubble" style="left:58%;width:44px;height:44px;animation-duration:16s;animation-delay:1s;"></div>
    <div class="bubble" style="left:78%;width:38px;height:38px;animation-duration:21s;animation-delay:3s;"></div>
    <div class="bubble" style="left:95%;width:26px;height:26px;animation-duration:17s;animation-delay:4s;"></div>
  </div>

  <header>
    <div class="container">
      <nav>
        <a href="/" class="logo">BoardGameGeek</a>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/search">Browse</a></li>
          <li id="nav-login"><a href="/login">Sign In</a></li>
          <li id="nav-user" style="display: none;"><a href="#" id="username-link"></a></li>
          <li id="nav-logout" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
        </ul>
        <form class="search-bar" onsubmit="quickSearch(event)">
          <input type="text" id="quick-search-input" placeholder="Search games...">
          <button type="submit">Go</button>
        </form>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="section-title">Browse & Discover</h1>

      <div id="category-chips" class="category-chips"></div>

      <div class="search-filters">
        <input type="text" id="search-input" placeholder="Search by name, designer...">
        <select id="sort-select">
          <option value="avg_rating">Top Rated</option>
          <option value="name">Name (A-Z)</option>
          <option value="year_published">Newest</option>
          <option value="complexity">Most Complex</option>
          <option value="hot">Hottest</option>
        </select>
        <select id="players-filter">
          <option value="">Any Players</option>
          <option value="1">Solo</option>
          <option value="2">2+ Players</option>
          <option value="4">4+ Players</option>
        </select>
        <select id="complexity-filter">
          <option value="">Any Complexity</option>
          <option value="2">Light (<=2)</option>
          <option value="3">Medium (<=3)</option>
          <option value="4">Heavy (<=4)</option>
        </select>
        <button class="btn btn-primary" onclick="searchGames()">Search</button>
      </div>

      <div id="search-results" class="search-results"></div>

      <div id="recommendations-container"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>BoardGameGeek Clone &copy; 2026 | Built with Frutiger Aero Aesthetic</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
