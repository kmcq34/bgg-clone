<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Games - BGWiki</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
      padding: 8px 10px;
      background: linear-gradient(180deg, #eaf2f8 0%, #d8e6f2 100%);
      border: 2px outset var(--border-light);
    }
    .chip {
      padding: 2px 10px;
      border: 1px solid var(--border-light);
      background: linear-gradient(180deg, #f0f6fc 0%, #dce6f0 100%);
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      color: var(--text-body);
      font-family: 'Trebuchet MS', sans-serif;
    }
    .chip:hover {
      background: linear-gradient(180deg, #e0ecf8 0%, #c8daf0 100%);
    }
    .chip.active {
      background: linear-gradient(180deg, #5fad5f 0%, #2d7a2d 100%);
      color: white;
      border-color: #2a6a2a;
    }
    .chip .count {
      font-size: 10px;
      opacity: 0.7;
    }
    .proposition-section {
      margin-bottom: 16px;
    }
    .proposition-header h2 {
      font-family: 'Georgia', serif;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--text-heading);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .proposition-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .proposition-tag {
      display: inline-block;
      background: linear-gradient(180deg, #5fad5f 0%, #2d7a2d 100%);
      color: white;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: bold;
      border: 1px outset #2a6a2a;
      margin-bottom: 4px;
    }
    .proposition-tag.orange {
      background: linear-gradient(180deg, #e8a030 0%, #c07020 100%);
      border-color: #a06020;
    }
    .proposition-tag.blue {
      background: linear-gradient(180deg, #4a8ed4 0%, #1a5ca8 100%);
      border-color: #1a4a80;
    }
    .proposition-tag.purple {
      background: linear-gradient(180deg, #8a6ad0 0%, #5a3aa0 100%);
      border-color: #4a2a80;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="/" class="logo">BGWiki</a>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/search">Browse</a></li>
          <li><a href="/add-game">Add Game</a></li>
          <li id="nav-login"><a href="/login">Sign In</a></li>
          <li id="nav-user" style="display: none;"><a href="#" id="username-link"></a></li>
          <li id="nav-logout" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
        </ul>
        <form class="search-bar" onsubmit="quickSearch(event)">
          <input type="text" id="quick-search-input" placeholder="Search games...">
          <button type="submit">Go</button>
        </form>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="section-title">Browse & Discover</h1>

      <div id="category-chips" class="category-chips"></div>

      <div class="search-filters">
        <input type="text" id="search-input" placeholder="Search by name, designer...">
        <select id="sort-select">
          <option value="avg_rating">Top Rated</option>
          <option value="name">Name (A-Z)</option>
          <option value="year_published">Newest</option>
          <option value="complexity">Most Complex</option>
          <option value="hot">Hottest</option>
        </select>
        <select id="players-filter">
          <option value="">Any Players</option>
          <option value="1">Solo</option>
          <option value="2">2+ Players</option>
          <option value="4">4+ Players</option>
        </select>
        <select id="complexity-filter">
          <option value="">Any Complexity</option>
          <option value="2">Light &lt;=2</option>
          <option value="3">Medium &lt;=3</option>
          <option value="4">Heavy &lt;=4</option>
        </select>
        <button class="btn btn-primary" onclick="searchGames()">Search</button>
      </div>

      <div id="search-results" class="search-results"></div>

      <div id="recommendations-container"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>BGWiki &copy; 2026 &middot; <a href="https://github.com/kmcq34/bgg-clone" style="color:var(--text-muted);">GitHub</a></p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
