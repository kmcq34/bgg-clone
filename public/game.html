<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Details - BoardGameGeek</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="/" class="logo">BoardGameGeek</a>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/search">Browse</a></li>
          <li><a href="/add-game">Add Game</a></li>
          <li id="nav-login"><a href="/login">Sign In</a></li>
          <li id="nav-user" style="display: none;"><a href="#" id="username-link"></a></li>
          <li id="nav-logout" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
        </ul>
        <form class="search-bar" onsubmit="quickSearch(event)">
          <input type="text" id="quick-search-input" placeholder="Search games...">
          <button type="submit">Go</button>
        </form>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div id="game-detail" class="game-detail"></div>

      <div id="rating-section" class="rating-section" style="display: none;">
        <h3>Rate This Game</h3>
        <div class="rating-input" id="rating-buttons"></div>
        <div class="review-form">
          <textarea id="review-comment" placeholder="Write your review..."></textarea>
          <button class="btn btn-primary" onclick="submitReview()" style="margin-top: 1rem;">Submit Review</button>
        </div>
      </div>

      <div class="reviews-list">
        <h2>Community Reviews</h2>
        <div id="reviews"></div>
      </div>

      <div class="related-games">
        <h2 class="section-title">Similar Games</h2>
        <div class="related-games-grid" id="related-games"></div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>BoardGameGeek Clone &copy; 2026</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
