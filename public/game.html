<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Details - BoardGameGlobe</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .bubbles {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }
    .bubble {
      position: absolute;
      bottom: -50px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), rgba(100,200,255,0.15));
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bubbles">
    <div class="bubble" style="left:8%;width:45px;height:45px;animation-duration:14s;animation-delay:0s;"></div>
    <div class="bubble" style="left:22%;width:30px;height:30px;animation-duration:16s;animation-delay:3s;"></div>
    <div class="bubble" style="left:45%;width:55px;height:55px;animation-duration:18s;animation-delay:1s;"></div>
    <div class="bubble" style="left:68%;width:35px;height:35px;animation-duration:20s;animation-delay:2s;"></div>
    <div class="bubble" style="left:88%;width:40px;height:40px;animation-duration:15s;animation-delay:4s;"></div>
  </div>

  <header>
    <div class="container">
      <nav>
        <a href="/" class="logo">BoardGameGeek</a>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/search">Browse</a></li>
          <li id="nav-login"><a href="/login">Sign In</a></li>
          <li id="nav-user" style="display: none;"><a href="#" id="username-link"></a></li>
          <li id="nav-logout" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
        </ul>
        <form class="search-bar" onsubmit="quickSearch(event)">
          <input type="text" id="quick-search-input" placeholder="Search games...">
          <button type="submit">Go</button>
        </form>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div id="game-detail" class="game-detail"></div>

      <div id="rating-section" class="rating-section" style="display: none;">
        <h3>Rate This Game</h3>
        <div class="rating-input" id="rating-buttons"></div>
        <div class="review-form">
          <textarea id="review-comment" placeholder="Write your review..."></textarea>
          <button class="btn btn-primary" onclick="submitReview()" style="margin-top: 1rem;">Submit Review</button>
        </div>
      </div>

      <div class="reviews-list">
        <h2>Community Reviews</h2>
        <div id="reviews"></div>
      </div>

      <div class="related-games">
        <h2 class="section-title">Similar Games</h2>
        <div class="related-games-grid" id="related-games"></div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>BoardGameGeek Clone &copy; 2026 | Built with Frutiger Aero Aesthetic</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
