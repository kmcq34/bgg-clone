<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - BGWiki</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="/" class="logo">BGWiki</a>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/search">Browse</a></li>
          <li><a href="/add-game">Add Game</a></li>
          <li id="nav-login"><a href="/login">Sign In</a></li>
          <li id="nav-user" style="display: none;"><a href="#" id="username-link"></a></li>
          <li id="nav-logout" style="display: none;"><a href="#" onclick="logout()">Logout</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="login-form">
        <div id="auth-error" class="error-message" style="display: none;"></div>
        <div id="auth-success" class="success-message" style="display: none;"></div>

        <ul style="display: flex; list-style: none; margin-bottom: 1.5rem; border-bottom: 2px solid rgba(100, 180, 255, 0.2); align-items: center;">
          <li style="flex:1;"><a href="#" id="tab-login" style="display:block;text-align:center;border-bottom:2px solid var(--gloss-blue);padding-bottom:0.5rem;color:var(--gloss-blue);" onclick="showTab('login')">Sign In</a></li>
          <li style="padding:0 8px;color:var(--text-muted);font-size:11px;font-weight:bold;">or</li>
          <li style="flex:1;"><a href="#" id="tab-register" style="display:block;text-align:center;padding-bottom:0.5rem;color:var(--text-muted);" onclick="showTab('register')">Create Account</a></li>
        </ul>

        <form id="login-form" onsubmit="login(event)">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="login-username" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <form id="register-form" style="display: none;" onsubmit="register(event)">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="register-username" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="register-email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="register-password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>BGWiki &copy; 2026 &middot; <a href="https://github.com/kmcq34/bgg-clone" style="color:var(--text-muted);">GitHub</a></p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
